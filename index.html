<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<meta name="theme-color" content="#0d0d14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>マイン崩し</title>
<style>
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: #0d0d14;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; touch-action: none;
  }
  canvas { image-rendering: pixelated; display: block; }
</style>
</head>
<body>
<canvas id="game" width="480" height="640"></canvas>
<script>
'use strict';

// ===== 基本定数 =====
const W = 480, H = 640;
const HUD = 60;            // HUD領域の高さ（ここより上にはボールは行かない）
const COLS = 10, BS = 44;  // ブロック列数・1辺サイズ
const MX = (W - COLS * BS) / 2; // 左右マージン
const TOP = HUD + 12;      // ブロック開始Y

const cv = document.getElementById('game');
const ctx = cv.getContext('2d');

function fit() {
  const s = Math.min(innerWidth / W, innerHeight / H);
  cv.style.width = (W * s) + 'px';
  cv.style.height = (H * s) + 'px';
}
addEventListener('resize', fit); fit();

// ===== 乱数（テクスチャ生成用・シード付き） =====
function mulberry32(a) {
  return function() {
    a |= 0; a = a + 0x6D2B79F5 | 0;
    let t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

// ===== ブロック定義 =====
const TYPES = {
  dirt:     { hp: 1, score: 10,  color: '#79553a', name: '土' },
  planks:   { hp: 1, score: 15,  color: '#a07845', name: '木材' },
  stone:    { hp: 2, score: 25,  color: '#7f7f7f', name: '石' },
  coal:     { hp: 2, score: 35,  color: '#555555', name: '石炭鉱石' },
  iron:     { hp: 2, score: 50,  color: '#d8af93', name: '鉄鉱石' },
  gold:     { hp: 2, score: 70,  color: '#f9ec4e', name: '金鉱石' },
  diamond:  { hp: 3, score: 120, color: '#5decf5', name: 'ダイヤ鉱石' },
  obsidian: { hp: 4, score: 200, color: '#3f2d5c', name: '黒曜石' },
  tnt:      { hp: 1, score: 50,  color: '#ff6b35', name: 'TNT', tnt: true },
  bedrock:  { hp: 0, score: 0,   color: '#3a3a3a', name: '岩盤', unbreakable: true },
};

// ===== テクスチャ生成（11x11ピクセル → 44px） =====
function makeTex(fn, seed) {
  const c = document.createElement('canvas');
  c.width = c.height = BS;
  const g = c.getContext('2d');
  const rng = mulberry32(seed);
  fn(g, rng);
  return c;
}
function px(g, x, y, color, s = 4) { g.fillStyle = color; g.fillRect(x * s, y * s, s, s); }
function speckleFill(g, rng, palette) {
  for (let y = 0; y < 11; y++) for (let x = 0; x < 11; x++)
    px(g, x, y, palette[rng() * palette.length | 0]);
}
function oreTex(g, rng, oreColors) {
  speckleFill(g, rng, ['#7f7f7f', '#747474', '#8a8a8a', '#6f6f6f']);
  for (let i = 0; i < 4; i++) {
    const ox = 1 + rng() * 8 | 0, oy = 1 + rng() * 8 | 0;
    px(g, ox, oy, oreColors[0]); px(g, ox + 1, oy, oreColors[1]);
    px(g, ox, oy + 1, oreColors[1]); px(g, ox + 1, oy + 1, oreColors[0]);
  }
}
const TEX = {
  dirt:   makeTex((g, r) => speckleFill(g, r, ['#79553a', '#6b4a30', '#8a6142', '#5f4229']), 11),
  planks: makeTex((g, r) => {
    for (let y = 0; y < 11; y++) for (let x = 0; x < 11; x++) {
      if (y % 4 === 3) px(g, x, y, '#6e4f2a');
      else px(g, x, y, ['#a17c4a', '#96713f', '#aa8352'][r() * 3 | 0]);
    }
  }, 22),
  stone:  makeTex((g, r) => speckleFill(g, r, ['#7f7f7f', '#747474', '#8a8a8a', '#6f6f6f']), 33),
  coal:    makeTex((g, r) => oreTex(g, r, ['#222222', '#383838']), 44),
  iron:    makeTex((g, r) => oreTex(g, r, ['#d8af93', '#b98a6d']), 55),
  gold:    makeTex((g, r) => oreTex(g, r, ['#f9ec4e', '#d9c52e']), 66),
  diamond: makeTex((g, r) => oreTex(g, r, ['#5decf5', '#33c7d9']), 77),
  obsidian: makeTex((g, r) => speckleFill(g, r, ['#1b1123', '#241831', '#120b18', '#3f2d5c']), 88),
  bedrock: makeTex((g, r) => {
    for (let y = 0; y < 6; y++) for (let x = 0; x < 6; x++) {
      g.fillStyle = ['#4a4a4a', '#333333', '#5a5a5a', '#282828'][r() * 4 | 0];
      g.fillRect(x * 8, y * 8, 8, 8);
    }
  }, 99),
  tnt: makeTex((g, r) => {
    for (let y = 0; y < 11; y++) for (let x = 0; x < 11; x++) {
      if (y >= 4 && y <= 6) px(g, x, y, y === 5 ? '#e8e0d0' : '#d8d0c0');
      else px(g, x, y, ['#c8392e', '#b32c22', '#d94438'][r() * 3 | 0]);
    }
    g.fillStyle = '#3a2a20';
    g.font = 'bold 13px monospace';
    g.textAlign = 'center'; g.textBaseline = 'middle';
    g.fillText('TNT', BS / 2, BS / 2 + 1);
  }, 111),
};

// ひび割れオーバーレイ（3段階）
const CRACKS = [3, 5, 8].map((n, i) => makeTex((g, rng) => {
  g.strokeStyle = 'rgba(15,15,15,0.65)';
  g.lineWidth = 3;
  for (let k = 0; k < n; k++) {
    g.beginPath();
    let x = BS / 2 + (rng() - 0.5) * 10, y = BS / 2 + (rng() - 0.5) * 10;
    g.moveTo(x, y);
    const steps = 2 + rng() * 3 | 0;
    for (let s = 0; s < steps; s++) {
      x += (rng() - 0.5) * 26; y += (rng() - 0.5) * 26;
      g.lineTo(Math.max(0, Math.min(BS, x)), Math.max(0, Math.min(BS, y)));
    }
    g.stroke();
  }
}, 200 + i * 17));

// ===== ネザライトピッケル（ボール）スプライト 16x16 → 32px =====
const PICK_MAP = [
  '..DDDDDDDDDDDD..',
  '.DGGGGGGGGGGGGD.',
  'DGGDDDD..DDDDGGD',
  'DGD....BB....DGD',
  'DD.....BB.....DD',
  'D......BB......D',
  '.......BB.......',
  '.......BB.......',
  '.......BB.......',
  '.......BB.......',
  '.......BB.......',
  '.......BB.......',
  '.......BB.......',
  '.......BB.......',
  '.......LL.......',
  '................',
];
const PICK_COLORS = { D: '#4a4247', G: '#6b6167', B: '#7a5230', L: '#9a6d3f' };
const PICK = (() => {
  const c = document.createElement('canvas');
  c.width = c.height = 32;
  const g = c.getContext('2d');
  PICK_MAP.forEach((row, y) => {
    for (let x = 0; x < 16; x++) {
      const ch = row[x];
      if (ch !== '.') { g.fillStyle = PICK_COLORS[ch]; g.fillRect(x * 2, y * 2, 2, 2); }
    }
  });
  return c;
})();

// ハート（ライフ表示）7x6 → 21x18
const HEART_MAP = ['.XX.XX.', 'XXXXXXX', 'XXXXXXX', '.XXXXX.', '..XXX..', '...X...'];
function makeHeart(color) {
  const c = document.createElement('canvas');
  c.width = 21; c.height = 18;
  const g = c.getContext('2d');
  g.fillStyle = color;
  HEART_MAP.forEach((row, y) => {
    for (let x = 0; x < 7; x++) if (row[x] === 'X') g.fillRect(x * 3, y * 3, 3, 3);
  });
  return c;
}
const HEART = makeHeart('#e3373c');
const HEART_EMPTY = makeHeart('#3a3a44');

// 溶岩（画面下部の帯）
const LAVA = (() => {
  const c = document.createElement('canvas');
  c.width = W; c.height = 12;
  const g = c.getContext('2d');
  const rng = mulberry32(777);
  for (let x = 0; x < W / 4; x++) for (let y = 0; y < 3; y++) {
    g.fillStyle = ['#e25822', '#f47b20', '#ffa538', '#c73e12'][rng() * 4 | 0];
    g.fillRect(x * 4, y * 4, 4, 4);
  }
  return c;
})();

// ===== サウンド（WebAudio） =====
let actx = null, muted = false;
function initAudio() {
  if (!actx) { try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} }
  if (actx && actx.state === 'suspended') actx.resume();
}
function tone(freq, dur, type = 'square', vol = 0.12, slide = 0, delay = 0) {
  if (!actx || muted) return;
  const t0 = actx.currentTime + delay;
  const o = actx.createOscillator(), g = actx.createGain();
  o.type = type; o.frequency.setValueAtTime(freq, t0);
  if (slide) o.frequency.linearRampToValueAtTime(Math.max(30, freq + slide), t0 + dur);
  g.gain.setValueAtTime(vol, t0);
  g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
  o.connect(g); g.connect(actx.destination);
  o.start(t0); o.stop(t0 + dur);
}
function noiseSnd(dur, vol = 0.2, freq = 1000) {
  if (!actx || muted) return;
  const n = actx.sampleRate * dur | 0;
  const buf = actx.createBuffer(1, n, actx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < n; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / n);
  const src = actx.createBufferSource(); src.buffer = buf;
  const f = actx.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = freq;
  const g = actx.createGain(); g.gain.value = vol;
  src.connect(f); f.connect(g); g.connect(actx.destination);
  src.start();
}
const sHit    = () => tone(170 + Math.random() * 60, 0.05, 'square', 0.10);
const sBreak  = () => noiseSnd(0.10, 0.25, 1400);
const sTnt    = () => { noiseSnd(0.35, 0.4, 400); tone(90, 0.3, 'sawtooth', 0.18, -50); };
const sPad    = () => tone(300, 0.05, 'triangle', 0.15);
const sWall   = () => tone(240, 0.04, 'triangle', 0.10);
const sLaunch = () => tone(480, 0.07, 'square', 0.12, 200);
const sLose   = () => { tone(280, 0.15, 'sawtooth', 0.15, -120); tone(160, 0.25, 'sawtooth', 0.15, -80, 0.13); };
const sClear  = () => [392, 523, 659, 784].forEach((f, i) => tone(f, 0.14, 'square', 0.12, 0, i * 0.11));

// ===== ゲーム状態 =====
let state = 'title'; // title | play | pause | clear | over
let score = 0, level = 1, lives = 3, hiscore = 0;
try { hiscore = +localStorage.getItem('minekuzushi_hiscore') || 0; } catch (e) {}
function saveHi() {
  if (score > hiscore) { hiscore = score; try { localStorage.setItem('minekuzushi_hiscore', hiscore); } catch (e) {} }
}

let blocks = [], grid = {};
const paddle = { x: W / 2 - 48, y: H - 52, w: 96, h: 14 };
const ball = { x: 0, y: 0, vx: 0, vy: 0, r: 9, speed: 300, onPaddle: true, rot: 0 };
let particles = [], floaters = [];
let shake = 0, msgTimer = 0, titleRot = 0;
const keys = {};

// HUD内のタッチボタン（一時停止・ミュート）
const BTN = {
  pause: { x: W - 44, y: 12, s: 32 },
  mute:  { x: W - 84, y: 12, s: 32 },
};

// ===== レベル生成 =====
function pickType(l, rng, bedCount) {
  const w = [
    ['dirt', 26], ['planks', 18],
    ['stone', 14 + l * 4], ['coal', 8 + l], ['iron', 6 + l],
    ['gold', 4 + l], ['diamond', 2 + l],
    ['obsidian', l >= 2 ? (l - 1) * 3 : 0],
    ['tnt', 7],
    ['bedrock', (l >= 3 && bedCount < 6) ? (l - 2) * 2 : 0],
  ];
  let tot = 0; for (const [, v] of w) tot += v;
  let x = rng() * tot;
  for (const [k, v] of w) { x -= v; if (x < 0) return k; }
  return 'dirt';
}
function genLevel(l) {
  blocks = []; grid = {};
  const rows = Math.min(5 + Math.floor((l - 1) / 2), 7);
  const rng = mulberry32(l * 1337 + 7);
  let bedCount = 0;
  for (let r = 0; r < rows; r++) for (let c = 0; c < COLS; c++) {
    const t = pickType(l, rng, bedCount);
    if (t === 'bedrock') bedCount++;
    const info = TYPES[t];
    const b = { c, r, x: MX + c * BS, y: TOP + r * BS, type: t, hp: info.hp, maxHp: info.hp, alive: true };
    blocks.push(b);
    grid[r * COLS + c] = b;
  }
}

function resetBall() {
  ball.onPaddle = true;
  ball.speed = Math.min(520, 300 + (level - 1) * 22);
  paddle.w = Math.max(64, 96 - (level - 1) * 4);
  paddle.x = W / 2 - paddle.w / 2;
}
function startGame() {
  score = 0; lives = 3; level = 1;
  genLevel(1); resetBall();
  state = 'play';
}
function nextLevel() {
  level++;
  genLevel(level); resetBall();
  state = 'play';
}

// ===== ブロック破壊 =====
function spawnParticles(b, color, n = 8) {
  const base = color || TYPES[b.type].color;
  for (let i = 0; i < n; i++) {
    particles.push({
      x: b.x + BS / 2, y: b.y + BS / 2,
      vx: (Math.random() - 0.5) * 260, vy: -Math.random() * 220 - 40,
      c: base, t: 0, life: 0.5 + Math.random() * 0.3, size: 4 + Math.random() * 4,
    });
  }
}
function addFloater(b, pts) {
  floaters.push({ x: b.x + BS / 2, y: b.y + BS / 2, txt: '+' + pts, t: 0 });
}
function killBlock(b) {
  b.alive = false;
  const pts = TYPES[b.type].score;
  score += pts;
  spawnParticles(b);
  addFloater(b, pts);
}
function explode(b) {
  if (!b.alive) return;
  b.alive = false;
  score += TYPES.tnt.score;
  addFloater(b, TYPES.tnt.score);
  shake = Math.min(12, shake + 7);
  sTnt();
  spawnParticles(b, '#ff6b35', 16);
  for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++) {
    if (!dr && !dc) continue;
    const nr = b.r + dr, nc = b.c + dc;
    if (nc < 0 || nc >= COLS || nr < 0) continue;
    const n = grid[nr * COLS + nc];
    if (!n || !n.alive) continue;
    if (n.type === 'tnt') explode(n);
    else if (!TYPES[n.type].unbreakable) killBlock(n);
  }
}
function checkClear() {
  if (!blocks.some(b => b.alive && !TYPES[b.type].unbreakable)) {
    state = 'clear'; msgTimer = 0;
    saveHi(); sClear();
  }
}
function damageBlock(b) {
  if (TYPES[b.type].unbreakable) { sHit(); return; }
  if (b.type === 'tnt') { explode(b); checkClear(); return; }
  b.hp--;
  if (b.hp <= 0) { killBlock(b); sBreak(); checkClear(); }
  else { score += 5; sHit(); }
}

// ===== ボール物理 =====
function circleRect(cx, cy, r, rx, ry, rw, rh) {
  const px = Math.max(rx, Math.min(cx, rx + rw));
  const py = Math.max(ry, Math.min(cy, ry + rh));
  const dx = cx - px, dy = cy - py;
  return dx * dx + dy * dy <= r * r;
}
function loseLife() {
  lives--;
  sLose(); shake = 8;
  if (lives <= 0) { state = 'over'; saveHi(); }
  else resetBall();
}
function stepBall(dt) {
  ball.x += ball.vx * dt; ball.y += ball.vy * dt;
  if (ball.x < ball.r) { ball.x = ball.r; ball.vx = Math.abs(ball.vx); sWall(); }
  if (ball.x > W - ball.r) { ball.x = W - ball.r; ball.vx = -Math.abs(ball.vx); sWall(); }
  if (ball.y < HUD + ball.r) { ball.y = HUD + ball.r; ball.vy = Math.abs(ball.vy); sWall(); }
  if (ball.y > H + ball.r + 10) { loseLife(); return; }
  // パドル反射（当たり位置で角度が変わる）
  if (ball.vy > 0 && circleRect(ball.x, ball.y, ball.r, paddle.x, paddle.y, paddle.w, paddle.h)) {
    const rel = Math.max(-1, Math.min(1, (ball.x - (paddle.x + paddle.w / 2)) / (paddle.w / 2)));
    const a = rel * 1.05;
    ball.vx = ball.speed * Math.sin(a);
    ball.vy = -ball.speed * Math.cos(a);
    ball.y = paddle.y - ball.r - 1;
    sPad();
  }
  // ブロック衝突
  for (const b of blocks) {
    if (!b.alive) continue;
    const cx = Math.max(b.x, Math.min(ball.x, b.x + BS));
    const cy = Math.max(b.y, Math.min(ball.y, b.y + BS));
    const dx = ball.x - cx, dy = ball.y - cy;
    if (dx * dx + dy * dy <= ball.r * ball.r) {
      if (Math.abs(dx) > Math.abs(dy)) {
        ball.vx = dx > 0 ? Math.abs(ball.vx) : -Math.abs(ball.vx);
        ball.x = dx > 0 ? b.x + BS + ball.r : b.x - ball.r;
      } else {
        ball.vy = dy > 0 ? Math.abs(ball.vy) : -Math.abs(ball.vy);
        ball.y = dy > 0 ? b.y + BS + ball.r : b.y - ball.r;
      }
      damageBlock(b);
      break;
    }
  }
}
function launchBall() {
  if (!ball.onPaddle) return;
  ball.onPaddle = false;
  const a = (Math.random() - 0.5) * 0.8;
  ball.vx = ball.speed * Math.sin(a);
  ball.vy = -ball.speed * Math.cos(a);
  sLaunch();
}

// ===== 更新 =====
function update(dt) {
  titleRot += dt;
  if (shake > 0) shake = Math.max(0, shake - dt * 30);
  particles = particles.filter(p => (p.t += dt) < p.life);
  for (const p of particles) { p.x += p.vx * dt; p.y += p.vy * dt; p.vy += 600 * dt; }
  floaters = floaters.filter(f => (f.t += dt) < 0.8);

  if (state === 'clear') {
    msgTimer += dt;
    if (msgTimer > 2.2) nextLevel();
    return;
  }
  if (state !== 'play') return;

  // パドル移動（キー）
  const pv = 520 * dt;
  if (keys.ArrowLeft || keys.a) paddle.x -= pv;
  if (keys.ArrowRight || keys.d) paddle.x += pv;
  paddle.x = Math.max(0, Math.min(W - paddle.w, paddle.x));

  if (ball.onPaddle) {
    ball.x = paddle.x + paddle.w / 2;
    ball.y = paddle.y - ball.r - 2;
    ball.rot = -0.4;
  } else {
    ball.rot += 11 * dt;
    const dist = Math.hypot(ball.vx, ball.vy) * dt;
    const n = Math.max(1, Math.ceil(dist / 6));
    for (let i = 0; i < n; i++) {
      stepBall(dt / n);
      if (state !== 'play' || ball.onPaddle) break;
    }
  }
}

// ===== 描画 =====
function txt(s, x, y, size, color = '#fff', align = 'center', shadow = true) {
  ctx.font = `bold ${size}px 'MS Gothic', 'Yu Gothic', monospace`;
  ctx.textAlign = align; ctx.textBaseline = 'middle';
  if (shadow) { ctx.fillStyle = '#000'; ctx.fillText(s, x + Math.max(2, size / 12), y + Math.max(2, size / 12)); }
  ctx.fillStyle = color;
  ctx.fillText(s, x, y);
}
function drawPaddle() {
  ctx.drawImage(TEX.dirt, 0, 0, BS, BS, paddle.x, paddle.y, paddle.w, paddle.h);
  ctx.fillStyle = '#5d9c3f';
  ctx.fillRect(paddle.x, paddle.y, paddle.w, 5);
  ctx.fillStyle = '#4c8232';
  for (let i = 0; i < paddle.w / 8; i++) if (i % 2) ctx.fillRect(paddle.x + i * 8, paddle.y + 3, 4, 2);
  ctx.strokeStyle = '#000'; ctx.lineWidth = 2;
  ctx.strokeRect(paddle.x + 1, paddle.y + 1, paddle.w - 2, paddle.h - 2);
}
function drawBall(x, y, rot, scale = 1) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(rot);
  ctx.scale(scale, scale);
  ctx.drawImage(PICK, -16, -16);
  ctx.restore();
}
function drawBlocks() {
  for (const b of blocks) {
    if (!b.alive) continue;
    ctx.drawImage(TEX[b.type], b.x, b.y);
    ctx.strokeStyle = 'rgba(0,0,0,0.45)'; ctx.lineWidth = 2;
    ctx.strokeRect(b.x + 1, b.y + 1, BS - 2, BS - 2);
    if (b.hp < b.maxHp) {
      const stage = Math.min(2, Math.floor((1 - b.hp / b.maxHp) * 3));
      ctx.drawImage(CRACKS[stage], b.x, b.y);
    }
  }
}
function drawBtnBase(b) {
  ctx.fillStyle = '#2a2a36';
  ctx.fillRect(b.x, b.y, b.s, b.s);
  ctx.strokeStyle = '#55556a'; ctx.lineWidth = 2;
  ctx.strokeRect(b.x + 1, b.y + 1, b.s - 2, b.s - 2);
}
function drawPauseBtn() {
  const b = BTN.pause;
  drawBtnBase(b);
  ctx.fillStyle = '#e8e8f0';
  if (state === 'pause') {
    ctx.beginPath();
    ctx.moveTo(b.x + 11, b.y + 8);
    ctx.lineTo(b.x + 25, b.y + 16);
    ctx.lineTo(b.x + 11, b.y + 24);
    ctx.closePath(); ctx.fill();
  } else {
    ctx.fillRect(b.x + 9, b.y + 8, 5, 16);
    ctx.fillRect(b.x + 18, b.y + 8, 5, 16);
  }
}
function drawMuteBtn() {
  const b = BTN.mute;
  drawBtnBase(b);
  ctx.fillStyle = '#e8e8f0';
  ctx.beginPath();
  ctx.moveTo(b.x + 7, b.y + 13); ctx.lineTo(b.x + 12, b.y + 13);
  ctx.lineTo(b.x + 17, b.y + 8); ctx.lineTo(b.x + 17, b.y + 24);
  ctx.lineTo(b.x + 12, b.y + 19); ctx.lineTo(b.x + 7, b.y + 19);
  ctx.closePath(); ctx.fill();
  if (muted) {
    ctx.strokeStyle = '#e3373c'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(b.x + 6, b.y + 26); ctx.lineTo(b.x + 26, b.y + 6); ctx.stroke();
  } else {
    ctx.strokeStyle = '#e8e8f0'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(b.x + 19, b.y + 16, 5, -0.9, 0.9); ctx.stroke();
    ctx.beginPath(); ctx.arc(b.x + 19, b.y + 16, 9, -0.9, 0.9); ctx.stroke();
  }
}
function drawHUD() {
  ctx.fillStyle = '#1a1a24';
  ctx.fillRect(0, 0, W, HUD);
  ctx.fillStyle = '#3aa32f';
  ctx.fillRect(0, HUD - 3, W, 3);
  txt(`スコア ${score}`, 14, 20, 16, '#fff', 'left');
  txt(`ハイスコア ${hiscore}`, 14, 44, 12, '#9a9aa8', 'left');
  txt(`レベル ${level}`, W / 2, 32, 18, '#ffd83d');
  for (let i = 0; i < 3; i++)
    ctx.drawImage(i < lives ? HEART : HEART_EMPTY, W - 96 - (3 - i) * 27, 22);
  if (state === 'play' || state === 'pause') drawPauseBtn();
  drawMuteBtn();
}
function drawGround() {
  // タイトル画面の地面（草付き土ブロック）
  for (let c = 0; c < COLS + 1; c++) {
    const x = c * BS - BS / 2;
    ctx.drawImage(TEX.dirt, x, H - BS);
    ctx.fillStyle = '#5d9c3f';
    ctx.fillRect(x, H - BS, BS, 8);
  }
}
function draw() {
  ctx.save();
  if (shake > 0) ctx.translate((Math.random() - 0.5) * shake, (Math.random() - 0.5) * shake);

  // 背景（洞窟風）
  ctx.fillStyle = '#101018';
  ctx.fillRect(-20, -20, W + 40, H + 40);

  if (state === 'title') {
    drawGround();
    drawBall(W / 2, 190, Math.sin(titleRot * 1.5) * 0.35, 3);
    txt('マイン崩し', W / 2, 300, 52, '#fff');
    txt('- MINE KUZUSHI -', W / 2, 340, 14, '#3aa32f');
    txt('クリック / タップ でスタート', W / 2, 410, 18, Math.sin(titleRot * 4) > -0.3 ? '#ffd83d' : '#665a20');
    txt('スライド / マウス / ←→キー : 移動', W / 2, 460, 13, '#9a9aa8');
    txt('タップ / クリック / スペース : 発射', W / 2, 482, 13, '#9a9aa8');
    txt('一時停止・ミュートは右上ボタン (P / Mキー)', W / 2, 504, 13, '#9a9aa8');
    // ブロック凡例
    const legend = ['dirt', 'stone', 'iron', 'diamond', 'tnt'];
    const lw = legend.length * (BS + 26) - 26;
    legend.forEach((t, i) => {
      const x = W / 2 - lw / 2 + i * (BS + 26);
      ctx.drawImage(TEX[t], x, 530);
      txt(TYPES[t].tnt ? '爆発!' : `${TYPES[t].score}点`, x + BS / 2, 588, 11, '#ccc');
    });
    if (hiscore > 0) txt(`ハイスコア ${hiscore}`, W / 2, 370, 14, '#9a9aa8');
    ctx.restore();
    return;
  }

  // 溶岩（最下部）
  ctx.drawImage(LAVA, 0, H - 8);

  drawBlocks();
  drawPaddle();
  drawBall(ball.x, ball.y, ball.rot);

  for (const p of particles) {
    ctx.globalAlpha = 1 - p.t / p.life;
    ctx.fillStyle = p.c;
    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
  }
  ctx.globalAlpha = 1;
  for (const f of floaters) {
    ctx.globalAlpha = 1 - f.t / 0.8;
    txt(f.txt, f.x, f.y - f.t * 40, 14, '#ffd83d');
  }
  ctx.globalAlpha = 1;

  if (state === 'play' && ball.onPaddle)
    txt('タップ / クリック / スペース で発射', W / 2, H - 110, 14, Math.sin(titleRot * 4) > -0.3 ? '#ffd83d' : '#665a20');

  if (state === 'pause') {
    ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(0, 0, W, H);
    txt('一時停止中', W / 2, H / 2 - 10, 32);
    txt('タップ / P で再開', W / 2, H / 2 + 30, 14, '#9a9aa8');
  }
  if (state === 'clear') {
    ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.fillRect(0, 0, W, H);
    txt(`レベル ${level} クリア!`, W / 2, H / 2 - 20, 36, '#3aa32f');
    txt('次のレベルへ…', W / 2, H / 2 + 30, 16);
  }
  if (state === 'over') {
    ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(0, 0, W, H);
    txt('ゲームオーバー', W / 2, H / 2 - 60, 40, '#e3373c');
    txt(`スコア ${score}`, W / 2, H / 2, 22);
    if (score >= hiscore && score > 0) txt('ハイスコア更新!', W / 2, H / 2 + 34, 16, '#ffd83d');
    else txt(`ハイスコア ${hiscore}`, W / 2, H / 2 + 34, 14, '#9a9aa8');
    txt('タップ / クリック でもう一度', W / 2, H / 2 + 80, 16, Math.sin(titleRot * 4) > -0.3 ? '#ffd83d' : '#665a20');
  }

  drawHUD();
  ctx.restore();
}

// ===== 入力 =====
function canvasPos(e) {
  const rect = cv.getBoundingClientRect();
  const p = e.touches ? e.touches[0] : e;
  return {
    x: (p.clientX - rect.left) * (W / rect.width),
    y: (p.clientY - rect.top) * (H / rect.height),
  };
}
function movePaddle(pos) {
  if (state !== 'play' && state !== 'clear') return;
  paddle.x = Math.max(0, Math.min(W - paddle.w, pos.x - paddle.w / 2));
}
function inBtn(b, pos) {
  return pos.x >= b.x && pos.x <= b.x + b.s && pos.y >= b.y && pos.y <= b.y + b.s;
}
function onButton(pos) {
  return state !== 'title' && (
    inBtn(BTN.mute, pos) ||
    ((state === 'play' || state === 'pause') && inBtn(BTN.pause, pos))
  );
}
function togglePause() {
  if (state === 'play') state = 'pause';
  else if (state === 'pause') state = 'play';
}
function pressAt(pos) {
  initAudio();
  if (onButton(pos)) {
    if (inBtn(BTN.mute, pos)) muted = !muted;
    else togglePause();
    return;
  }
  if (state === 'title') startGame();
  else if (state === 'play') launchBall();
  else if (state === 'pause') state = 'play';
  else if (state === 'over') startGame();
}
cv.addEventListener('mousemove', e => movePaddle(canvasPos(e)));
cv.addEventListener('touchmove', e => { e.preventDefault(); movePaddle(canvasPos(e)); }, { passive: false });
cv.addEventListener('mousedown', e => pressAt(canvasPos(e)));
cv.addEventListener('touchstart', e => {
  e.preventDefault();
  const pos = canvasPos(e);
  if (!onButton(pos)) movePaddle(pos);
  pressAt(pos);
}, { passive: false });
addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === ' ') { e.preventDefault(); pressAt({ x: -1, y: -1 }); }
  if (e.key === 'm' || e.key === 'M') muted = !muted;
  if (e.key === 'p' || e.key === 'P') togglePause();
});
addEventListener('keyup', e => { keys[e.key] = false; });
// バックグラウンドに回ったら自動で一時停止（スマホのアプリ切替対策）
document.addEventListener('visibilitychange', () => {
  if (document.hidden && state === 'play') state = 'pause';
});

// デバッグ用（テスト検証で参照）
window.__game = {
  get state() { return state; },
  get score() { return score; },
  get level() { return level; },
  get lives() { return lives; },
  get ball() { return ball; },
  get blocks() { return blocks; },
  get muted() { return muted; },
};

// ===== メインループ =====
let last = 0;
function frame(t) {
  const dt = Math.min(0.033, (t - last) / 1000 || 0);
  last = t;
  update(dt);
  draw();
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
